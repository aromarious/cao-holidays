name: バグ報告 (Bug report)
description: cao-holidays の挙動が想定と違うときに使ってください
title: '[bug] '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        ご報告ありがとうございます。再現可能な情報があるとデバッグが速く進みます。
        セキュリティ上の脆弱性は **public issue ではなく** [Private Vulnerability Reporting](https://github.com/aromarious/cao-holidays/security/advisories/new) からお願いします。

  - type: input
    id: version
    attributes:
      label: cao-holidays version
      description: '`npm view cao-holidays version` または `package.json` の値'
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: '`node --version` の出力'
      placeholder: 'v24.15.0'
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: どのインターフェイス
      options:
        - CLI (`npx cao-holidays ...`)
        - Library (`import { ... } from 'cao-holidays'`)
        - 両方
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 再現手順
      description: コマンドや最小コードを貼ってください
      placeholder: |
        ```sh
        npx cao-holidays 2026
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待した結果
      placeholder: '元日が含まれる CSV が出力される'
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の結果
      description: エラーメッセージやスタックトレースを含めてください
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: その他補足
      description: 関連 issue / 環境（Docker、Cloudflare Workers 等）など
