name: Release

on:
  push:
    branches: [main]

# - contents: write          : push tags / commit version bump
# - pull-requests: write     : open / update the Release PR
# - id-token: write          : npm OIDC trusted publisher
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # changesets が tag を打つために full history が必要
          # Use PAT so the Release PR's commits are recognized as user-initiated
          # and trigger required CI / CodeQL workflows (GITHUB_TOKEN-pushed
          # commits do not, by GitHub Actions loop-prevention design).
          # Falls back to GITHUB_TOKEN when RELEASE_TOKEN is not configured
          # (e.g. forks), at the cost of needing manual empty commits to
          # trigger required checks on the Release PR.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'   # npm 11+ for trusted publishing
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Build (sanity check before publish)
        run: pnpm --dir packages/js build

      # NOTE: Trusted Publisher は workflow file 名 `release.yml` に紐付いて npm 側に登録済み。
      # multi-language 化で `release-js.yml` に rename する場合、npm Trusted Publisher の
      # 設定 (Workflow filename) も一緒に更新する必要がある。Phase 13 ではここでは rename しない。
      #
      # `.changeset/` は repo root に置く（`changesets/action@v1` の `cwd` パラメータが
      # `readChangesetState` には伝わらないバグの回避策。fix は changesets/action main に
      # 入っているが未リリース）。`pnpm-workspace.yaml` で packages/js を workspace member として
      # 宣言しているので、changesets / @manypkg は packages/js/package.json を発見する。
      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          # `changeset publish` queries npm registry per package and skips
          # already-published versions, avoiding "version already exists"
          # noise on every push to main when there's no pending changeset.
          # publishConfig.access (=public) and publishConfig.provenance (=true)
          # in packages/js/package.json are honored automatically.
          publish: pnpm --dir packages/js exec changeset publish
          version: pnpm --dir packages/js exec changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # Same PAT is used here so the Release PR (open / update / push) is
          # authored by the PAT identity, which causes downstream CI / CodeQL
          # workflows to start without manual intervention.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
