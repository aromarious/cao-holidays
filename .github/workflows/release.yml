name: Release

on:
  push:
    branches: [main]

# - contents: write          : push tags / commit version bump
# - pull-requests: write     : open / update the Release PR
# - id-token: write          : npm OIDC trusted publisher
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets が tag を打つために full history が必要

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (sanity check before publish)
        run: pnpm build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm publish --access public --provenance --no-git-checks
          version: pnpm exec changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
