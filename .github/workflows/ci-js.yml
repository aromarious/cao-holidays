name: CI (JS)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# - contents: read     : checkout
# - pull-requests: read: dorny/paths-filter が PR 時に変更ファイルを取得
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-js-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # JS パッケージに関係するファイルが変更されたかを検出する。
  # 検出結果に応じて build 行をスキップさせることで、required status check の context 名は
  # 常に発行されつつ、無関係な PR (例: Python のみ変更) では実テストはスキップされる。
  # (workflow レベルの paths filter だと workflow 自体が起動せず、required check が
  # `expected` のまま埋まらない問題を回避する。)
  changes:
    name: Detect JS changes
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            js:
              - 'packages/js/**'
              - 'fixtures/**'
              - 'scripts/sync-fixture.mjs'
              - 'scripts/generate-fixtures.mjs'
              - '.github/workflows/ci-js.yml'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'

  build:
    name: Build & test (Node ${{ matrix.node }})
    needs: changes
    if: ${{ needs.changes.outputs.js == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        working-directory: ./packages/js
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        working-directory: ./packages/js
        run: pnpm typecheck

      - name: Test (vitest)
        working-directory: ./packages/js
        run: pnpm test

      - name: Build (tsup)
        working-directory: ./packages/js
        run: pnpm build

      - name: Smoke test dist bin
        working-directory: ./packages/js
        run: |
          out=$(node dist/bin/cao-holidays.js --version)
          echo "version output: $out"
          test -n "$out"

      - name: publint
        working-directory: ./packages/js
        run: pnpm exec publint

      - name: arethetypeswrong
        working-directory: ./packages/js
        run: pnpm exec attw --pack . --ignore-rules cjs-resolves-to-esm
