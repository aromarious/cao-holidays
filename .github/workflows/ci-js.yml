name: CI (JS)

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/js/**'
      - 'fixtures/**'
      - 'scripts/sync-fixture.mjs'
      - 'scripts/generate-fixtures.mjs'
      - '.github/workflows/ci-js.yml'
  push:
    branches: [main]
    paths:
      - 'packages/js/**'
      - 'fixtures/**'
      - 'scripts/sync-fixture.mjs'
      - 'scripts/generate-fixtures.mjs'
      - '.github/workflows/ci-js.yml'

permissions:
  contents: read

concurrency:
  group: ci-js-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        working-directory: ./packages/js
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        working-directory: ./packages/js
        run: pnpm typecheck

      - name: Test (vitest)
        working-directory: ./packages/js
        run: pnpm test

      - name: Build (tsup)
        working-directory: ./packages/js
        run: pnpm build

      - name: Smoke test dist bin
        working-directory: ./packages/js
        run: |
          out=$(node dist/bin/cao-holidays.js --version)
          echo "version output: $out"
          test -n "$out"

      - name: publint
        working-directory: ./packages/js
        run: pnpm exec publint

      - name: arethetypeswrong
        working-directory: ./packages/js
        run: pnpm exec attw --pack . --ignore-rules cjs-resolves-to-esm
