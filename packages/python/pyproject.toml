[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cao-holidays"
description = "Fetch Japanese national holidays from the Cabinet Office (内閣府) official CSV."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "aromarious", email = "aromarious@gmail.com" }]
keywords = [
    "japan",
    "japanese",
    "holiday",
    "holidays",
    "祝日",
    "国民の祝日",
    "内閣府",
    "cao",
    "calendar",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.11"
dynamic = ["version"]
dependencies = [
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/aromarious/cao-holidays"
Repository = "https://github.com/aromarious/cao-holidays"
Issues = "https://github.com/aromarious/cao-holidays/issues"
Changelog = "https://github.com/aromarious/cao-holidays/blob/main/packages/python/CHANGELOG.md"

[tool.hatch.version]
path = "src/cao_holidays/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/cao_holidays"]

[tool.hatch.build.targets.sdist]
include = ["src/cao_holidays", "tests", "README.md", "LICENSE", "CHANGELOG.md", "pyproject.toml"]

[dependency-groups]
dev = [
    "mypy>=1.13",
    "pytest>=8.3",
    "respx>=0.21",
    "ruff>=0.10",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
# 日本語 docstring / コメント / 文字列で全角の `（）` `、` 等を意図的に使うため、
# RUF001/002/003 (ambiguous unicode) を無効化する
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src", "tests"]
warn_unused_ignores = true
warn_redundant_casts = true
disallow_any_explicit = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-config", "--strict-markers"]
filterwarnings = ["error"]
